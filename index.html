<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Website revamp marathon — prototypes</title>
    <style>
      :root {
        --bg: #171d2a;
        --panel: #1b2231;
        --mist: #f2f2f2;
        --ocean: #56bccf;
        --muted: #9198a9;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--mist);
        line-height: 1.5;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: clamp(32px, 6vw, 72px) clamp(20px, 4vw, 32px);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .lede {
        margin: 0 0 40px;
        color: var(--muted);
        font-size: 1.05rem;
      }
      h2 {
        margin: 0 0 16px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ocean);
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      a.card {
        display: block;
        padding: 20px 22px;
        border-radius: 12px;
        background: var(--panel);
        color: var(--mist);
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: border-color 0.2s ease, transform 0.2s ease;
      }
      a.card:hover {
        border-color: rgba(86, 188, 207, 0.45);
        transform: translateY(-1px);
      }
      a.card strong {
        display: block;
        font-size: 1.1rem;
        margin-bottom: 6px;
      }
      a.card span {
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Website revamp marathon</h1>
      <p class="lede">
        Overview of HTML/CSS prototypes for the sprint. Open a link below to review a page in the browser.
      </p>
      <h2>Prototypes</h2>
      <ul>
        <li>
          <a class="card" href="industry/index.html">
            <strong>Click to see industry page prototype</strong>
            <span>Hospitality industry landing — layout, components, and content pass.</span>
          </a>
        </li>
      </ul>
    </div>
  </body>
</html>
